        // Generate A-Z navigation bar buttons dynamically
        const alphabetContainer = document.getElementById('alphabet-buttons');
        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        
        alphabet.forEach(letter => {
            const btn = document.createElement('button');
            btn.className = `letter-btn ${letter === 'A' ? 'active' : ''}`;
            btn.textContent = letter;
            btn.id = `btn-${letter}`;
            btn.onclick = () => filterLetter(letter);
            alphabetContainer.appendChild(btn);
        });

        // Main logic function to render lists based on clicked letter
        function filterLetter(selectedLetter) {
            // Update Title
            document.getElementById('dynamic-title').textContent = `Browse by Tendering Authority "${selectedLetter}"`;
            
            // Toggle active state for button UI
            document.querySelectorAll('.letter-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${selectedLetter}`).classList.add('active');
            
            // Filter records matching the starting letter
            const filteredTenders = tendersData.filter(item => item.trim().toUpperCase().startsWith(selectedLetter));
            const gridDisplay = document.getElementById('tenders-display-grid');
            gridDisplay.innerHTML = ''; // Reset UI view
            
            if (filteredTenders.length === 0) {
                gridDisplay.innerHTML = `<div class="no-data">No Tendering Authorities available under character "${selectedLetter}".</div>`;
                return;
            }

            // Build dynamic items on UI
            filteredTenders.forEach(tenderName => {
                const link = document.createElement('a');
                link.className = 'tender-item';
                link.href = 'index.html#contact';
                link.innerHTML = `<i class="fas fa-chevron-right"></i> ${tenderName}`;
                gridDisplay.appendChild(link);
            });
        }

        // Initialize default view to character 'A' on page load
        window.onload = () => {
            filterLetter('A');
        };
    </script>
